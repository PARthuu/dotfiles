# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB" # Better color support for Mac terminal
set -g base-index 1          # Start window numbering at 1
setw -g pane-base-index 1    # Start pane numbering at 1
set -g renumber-windows on   # Renumber when a window is closed
set -g status-position bottom
set -g status-interval 5     # Refresh status line more often

# Prefix
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Better splits
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf

# Copy Mode
setw -g mode-keys vi

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Status Bar
set -g status-position bottom
set -g status-justify left

set -g status-left-length 100
set -g status-right-length 100

# Default-style status bar
set -g status-style "bg=default,fg=default"

# Left Side (Session)
set -g status-left "[#S] "

# Right Side (Current Directory)
set -g status-right "[#{pane_current_path}] "

# Tabs / Windows
# Inactive tabs
set -g window-status-format " #I:#W "

# Active tab
set -g window-status-current-format " #[reverse,bold] #I:#W #[default] "

# Separator between tabs
set -g window-status-separator "|"

# Optional activity styling
set -g window-status-activity-style "bold"
set -g window-status-bell-style "reverse"

# TPM (always at bottom)
run '~/.tmux/plugins/tpm/tpm'
